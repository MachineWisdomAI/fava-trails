name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install JJ
        run: |
          uv run fava-trails install-jj
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Run tests
        run: uv run pytest -v
        env:
          JJ_CONFIG: /dev/null
