name: Bug Report
description: Report a bug or unexpected behavior in FAVA Trails
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the fields below to help us diagnose the issue.

        **Note:** Security vulnerabilities should be reported privately via [GitHub Security Advisories](https://github.com/MachineWisdomAI/fava-trails/security/advisories/new), not as public issues.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Configure MCP server with ...
        2. Call tool `recall(trail_name="...", query="...")`
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: input
    id: jj-version
    attributes:
      label: JJ Version
      description: Output of `jj --version`
      placeholder: "jj 0.28.0"
    validations:
      required: true

  - type: input
    id: fava-trails-version
    attributes:
      label: FAVA Trails Version
      description: Output of `pip show fava-trails | grep Version` or the version from your uv.lock
      placeholder: "0.4.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Your OS and version
      placeholder: "macOS 15.2 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Output of `python --version`
      placeholder: "3.11.9"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, config snippets, or screenshots that might help.
